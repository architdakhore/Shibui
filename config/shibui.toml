# ShibUI Configuration File
# https://github.com/yourusername/shibui

[general]
name = "ShibUI"
layout_mode = "dynamic"  # dynamic, horizontal, vertical, center
log_level = "info"

[tiling]
gap_size = 8
border_width = 2
border_color = "#4C7899"
active_border_color = "#57A0C9"
master_ratio = 0.55
center_ratio = 0.6
window_width = 800
window_height = 600

[workspaces]
count = 10
scroll_mode = "both"  # horizontal, vertical, both

[animations]
enabled = true
duration_ms = 250
curve = "ease-out-expo"  # linear, ease-in, ease-out, ease-in-out, ease-out-expo, spring

[overview]
scale = 0.15
gap = 20
blur = true
scroll_direction = "both"  # horizontal, vertical, both

[input]
follow_mouse = true
natural_scroll = true
repeat_rate = 25
repeat_delay = 300

[keybindings]
mod_key = "SUPER"
# Format: "key" = "action"
"Mod+Return" = "spawn terminal"
"Mod+D" = "spawn launcher"
"Mod+Tab" = "toggle overview"
"Mod+H" = "focus left"
"Mod+J" = "focus down"
"Mod+K" = "focus up"
"Mod+L" = "focus right"
"Mod+Shift+Q" = "close window"
"Mod+1" = "workspace 1"
"Mod+2" = "workspace 2"
"Mod+3" = "workspace 3"
"Mod+4" = "workspace 4"
"Mod+5" = "workspace 5"
"Mod+6" = "workspace 6"
"Mod+7" = "workspace 7"
"Mod+8" = "workspace 8"
"Mod+9" = "workspace 9"
"Mod+0" = "workspace 10"
"Mod+Shift+1" = "movetoworkspace 1"
"Mod+Shift+2" = "movetoworkspace 2"
"Mod+Shift+3" = "movetoworkspace 3"
"Mod+Left" = "scroll left"
"Mod+Right" = "scroll right"
"Mod+Up" = "scroll up"
"Mod+Down" = "scroll down"
"Mod+M" = "cycle layout"
"Mod+C" = "cycle center pattern"
"Mod+Plus" = "increase master ratio"
"Mod+Minus" = "decrease master ratio"

[render]
vsync = true
hdr = false
backend = "opengl"  # opengl, vulkan
